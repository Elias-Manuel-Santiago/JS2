<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Filtro de Números</title>
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/layout.css">
  <link rel="stylesheet" href="/styles/components.css">
  <link rel="stylesheet" href="/styles/theme.css">
</head>

<body>

  <nav class="topnav">
    <span class="brand">Filtro de Números</span>
    <button class="nav-btn" data-view="filtrar">Filtrar</button>
  </nav>

  <div class="app-layout">

    <main id="app"></main>

    <aside class="panel aside-panel">
      <div class="aside-header">
        <h2>Archivos disponibles</h2>
        <span class="badge" id="file-count"></span>
      </div>
      <div id="lista-archivos"></div>
    </aside>

  </div>

  <footer>
    <button id="toggle-tema" aria-label="Cambiar tema">
      <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round">
        <circle cx="12"    cy="12"    r="5"                                     />
        <line x1="12"    y1="2"     x2="12"    y2="4"                           />
        <line x1="12"    y1="20"    x2="12"    y2="22"                          />
        <line x1="4.22"  y1="4.22"  x2="5.64"  y2="5.64"                       />
        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"                      />
        <line x1="2"     y1="12"    x2="4"     y2="12"                          />
        <line x1="20"    y1="12"    x2="22"    y2="12"                          />
        <line x1="4.22"  y1="19.78" x2="5.64"  y2="18.36"                      />
        <line x1="18.36" y1="5.64"  x2="19.78" y2="4.22"                       />
      </svg>
      <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
      </svg>
    </button>
  </footer>

  <script type="module" src="/scripts/script.js"></script>
</body>

</html>
